<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#eef0f4;--surface:#ffffff;--surface2:#e8ebf0;--border:#c8cdd8;--accent:#1d4ed8;--accent-light:#dbeafe;--text:#111827;--text2:#4b5563;--text3:#9ca3af;--green:#047857;--yellow:#b45309;--red:#b91c1c;--purple:#6d28d9;--orange:#c2410c;--header-bg:#1e293b;--section-bg:#f1f5f9;--section-title:#334155;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* 헤더 */
header{background:var(--header-bg);border-bottom:1px solid #0f172a;box-shadow:0 2px 8px rgba(0,0,0,0.15);padding:10px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
header h1{font-size:15px;font-weight:700;color:#f1f5f9;white-space:nowrap;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
.hdr-btn{border-radius:6px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.hdr-btn-msg{background:rgba(251,191,36,0.2);border:1.5px solid rgba(251,191,36,0.5);color:#fbbf24;}
.hdr-btn-sheet{background:rgba(52,211,153,0.2);border:1.5px solid rgba(52,211,153,0.5);color:#34d399;}
.hdr-btn-add{background:rgba(99,179,255,0.2);border:1.5px solid rgba(99,179,255,0.5);color:#93c5fd;}
.sync-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#cbd5e1;padding:5px 9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;}
.sync-btn.loading{color:var(--accent);border-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}} .spin{display:inline-block;animation:spin 0.8s linear infinite;}
.total-badge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap;}
.total-badge span{color:#93c5fd;font-weight:500;}
/* 필터 */
.filter-panel{background:#f8fafc;border-bottom:2px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;flex-direction:column;gap:5px;}
.filter-row-label{font-size:10px;font-weight:700;color:var(--section-title);letter-spacing:1px;text-transform:uppercase;}
.btn-group{display:flex;flex-wrap:wrap;gap:5px;}
.sel-btn{flex-shrink:0;padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.sel-btn:active{transform:scale(0.96);}
.sel-btn.type-mae{border-color:rgba(79,156,249,0.4);}.sel-btn.type-mae.active{background:#1d4ed8;border-color:#1d4ed8;color:#ffffff;}
.sel-btn.type-jun{border-color:rgba(52,211,153,0.4);}.sel-btn.type-jun.active{background:#047857;border-color:#047857;color:#ffffff;}
.sel-btn.type-wol{border-color:rgba(251,191,36,0.4);}.sel-btn.type-wol.active{background:#b45309;border-color:#b45309;color:#ffffff;}
.sel-btn.bld-all.active{background:#6d28d9;border-color:#6d28d9;color:#ffffff;}
.sel-btn.bld-one.active{background:#1d4ed8;border-color:#1d4ed8;color:#ffffff;}
.sel-btn.proc-all.active{background:#334155;border-color:#334155;color:#ffffff;}
.sel-btn.proc-propose.active{background:#c2410c;border-color:#c2410c;color:#ffffff;}
.sel-btn.proc-latent.active{background:#6d28d9;border-color:#6d28d9;color:#ffffff;}
.filter-divider{height:1px;background:var(--border);}
.bld-divider{width:100%;height:1px;background:var(--border);margin:2px 0;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px 9px 32px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}
.reset-btn{flex-shrink:0;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:13px;cursor:pointer;white-space:nowrap;}
/* 결과바 */
.result-bar{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2);border-bottom:2px solid var(--border);background:#f8fafc;}
.result-bar b{color:var(--accent);}
/* 카드 */
.card-list{padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 13px 24px;cursor:pointer;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.card:active{background:var(--surface2);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;}
.card-address{font-size:15px;font-weight:700;}.card-building{font-size:12px;color:var(--text3);margin-top:2px;}
.card-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.card-mid{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.card-price{font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.card-meta{font-size:12px;color:var(--text3);}
.card-phones{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.phone-link{color:var(--green);text-decoration:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:2px;padding:3px 8px;background:rgba(52,211,153,0.1);border-radius:6px;border:1px solid rgba(52,211,153,0.25);}
.card-memo{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-date{position:absolute;bottom:7px;right:12px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
/* 테이블 */
.table-wrap{display:none;overflow:auto;}
@media(min-width:900px){.card-list{display:none;}.table-wrap{display:block;height:calc(100vh - 340px);}}
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;}
thead{position:sticky;top:0;z-index:10;}
thead th{background:#334155;border-bottom:2px solid #1e293b;border-right:1px solid #475569;padding:9px 11px;text-align:left;font-weight:600;font-size:11px;color:#e2e8f0;white-space:nowrap;cursor:pointer;user-select:none;}
thead th.sorted{color:#93c5fd;}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:8px 11px;border-right:1px solid rgba(42,49,71,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
.col-date{width:86px}.col-type{width:60px}.col-building{width:88px}.col-dong{width:52px}.col-ho{width:48px}.col-typev{width:60px}.col-owner{width:148px}.col-price{width:84px}.col-process{width:112px}.col-room{width:38px}.col-contract{width:80px}.col-area{width:64px}.col-memo{width:200px}
/* 뱃지 */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-mae{background:#dbeafe;color:#1d4ed8;}.badge-jun{background:#d1fae5;color:#065f46;}.badge-wol{background:#fef3c7;color:#92400e;}.badge-mix{background:#ede9fe;color:#5b21b6;}
.proc-done{background:#d1fae5;color:#065f46;}.proc-cont{background:#dbeafe;color:#1d4ed8;}.proc-hold{background:#f3f4f6;color:#6b7280;}.proc-ord{background:#fef3c7;color:#92400e;}.proc-wait{background:#ede9fe;color:#5b21b6;}.proc-pay{background:#d1fae5;color:#065f46;}.proc-other{background:#fee2e2;color:#991b1b;}.proc-prop{background:#ffedd5;color:#9a3412;}
/* 상세 패널 */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.detail-overlay.open{display:flex;}
@media(min-width:600px){.detail-overlay{align-items:center;}.detail-panel{border-radius:12px!important;max-width:680px;width:95vw;max-height:85vh!important;}}
@keyframes slideUp{from{transform:translateY(80px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.detail-panel{background:#f8fafc;border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
.detail-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.detail-header{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:#1e293b;z-index:1;}
.detail-title{font-size:16px;font-weight:700;color:#f1f5f9;}.detail-subtitle{font-size:12px;color:#94a3b8;margin-top:3px;}
.detail-close{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#cbd5e1;padding:5px 10px;cursor:pointer;font-size:15px;flex-shrink:0;}
.detail-body{padding:14px 18px;}
.detail-phones{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;padding:11px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.18);border-radius:8px;}
.vcf-btn{background:rgba(79,156,249,0.12);border:1px solid rgba(79,156,249,0.3);border-radius:6px;color:#4f9cf9;font-size:11px;padding:3px 8px;cursor:pointer;margin-left:2px;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:10px;font-weight:700;color:#ffffff;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;padding:5px 8px;background:var(--section-title);border-radius:4px;}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
@media(min-width:480px){.detail-grid{grid-template-columns:repeat(3,1fr);}}
.detail-item{display:flex;flex-direction:column;gap:3px;}.di-label{font-size:10px;color:var(--text3);font-weight:500;}.di-value{font-size:13px;color:var(--text);word-break:break-all;}.di-value.hl{color:var(--accent);font-weight:700;font-size:15px;}
.memo-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:11px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
/* 수정폼 */
.edit-form{display:none;padding:14px 18px;border-top:2px solid var(--border);background:#ffffff;}
.edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px;}
.ef-group{display:flex;flex-direction:column;gap:3px;}
.ef-label{font-size:10px;color:var(--text3);}
.ef-input,.ef-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
.ef-input:focus,.ef-select:focus{border-color:var(--accent);}
.ef-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;resize:vertical;line-height:1.6;}
.ef-actions{display:flex;gap:8px;margin-top:4px;}
.ef-save{flex:1;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
.ef-cancel{padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;cursor:pointer;}
/* 토스트 */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid #059669;color:#f9fafb;padding:9px 16px;border-radius:10px;font-size:13px;z-index:9999;text-align:center;line-height:1.5;white-space:pre-line;box-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.3s;opacity:0;min-width:180px;max-width:80vw;}
#toast.show{opacity:1;}
/* 모달 공통 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal-panel{border-radius:12px!important;max-width:680px;width:95vw;max-height:85vh!important;}}
.modal-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
.modal-header{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:14px 18px;}
/* 로딩 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,0.92);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-overlay.show{display:flex;}.loading-spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}.loading-text{font-size:13px;color:var(--text2);}
.empty-state{text-align:center;padding:50px 24px;color:var(--text3);}.empty-icon{font-size:34px;margin-bottom:10px;}

/* 건물 확장 버튼 */
.bld-expand-btn{background:none;border:1.5px dashed var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.bld-expand-btn:hover{border-color:var(--text2);color:var(--text2);}
.bld-extra{display:none;width:100%;flex-wrap:wrap;gap:5px;margin-top:2px;}
.bld-extra.open{display:flex;}

/* 카드 새 레이아웃 */
.card-check{position:absolute;top:10px;left:10px;width:20px;height:20px;cursor:pointer;accent-color:#1d4ed8;z-index:2;}
.card{padding-left:36px!important;}
.card-row1{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-bottom:3px;}
.card-dong-ho{font-size:16px;font-weight:700;}
.card-building-name{font-size:12px;color:var(--text3);}
.card-price-area{text-align:right;flex-shrink:0;}
.card-price-big{font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.card-area-small{font-size:11px;color:var(--text3);margin-top:1px;}
.card-row2{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;align-items:center;}
.card-row3{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.card-phone-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.card-feature-tag{display:inline-flex;align-items:center;background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500;white-space:nowrap;}
.card-expire{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.card-expire.urgent{color:#b91c1c;font-weight:600;}
/* 상세페이지 태그 */
.feat-tag-display{display:inline-flex;align-items:center;background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;white-space:nowrap;}
.feature-tag{display:inline-flex;align-items:center;gap:4px;background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;}
.feature-tag .tag-del{background:none;border:none;color:#0369a1;cursor:pointer;font-size:14px;padding:0;line-height:1;opacity:.7;}
.tag-input-wrap{display:flex;gap:6px;align-items:center;margin-top:6px;margin-bottom:14px;}
.tag-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.tag-input:focus{border-color:#0369a1;}
.tag-add-btn{padding:7px 12px;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:6px;color:#0369a1;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}

async function getSheetName(){
  if(_sheetName) return _sheetName;
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'?key='+AKEY);
  var m=await r.json();
  if(m.error) throw new Error(m.error.message);
  var sf=m.sheets&&m.sheets.find(function(s){return String(s.properties.sheetId)===SGID;});
  _sheetName=sf?sf.properties.title:(m.sheets&&m.sheets[0]?m.sheets[0].properties.title:'');
  return _sheetName;
}
async function syncSheets(){
  var sb=document.getElementById('SB'),si=document.getElementById('SI'),lo=document.getElementById('LO'),lt=document.getElementById('LT');

    var sn=await getSheetName();
    lt.textContent='"'+sn+'" 로드 중...';
    var dr=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'/values/'+encodeURIComponent(sn)+'?key='+AKEY);
    var dj=await dr.json();
    if(!dj.values||dj.values.length<2) throw new Error('데이터 없음');
    var hd=dj.values[0].map(function(h){return h.replace(/\n/g,' ').trim();});
    var nd=dj.values.slice(1).map(function(row,i){
      var o={'__row__':i+2};

// 검색어 파싱: "아이702호","더샵 1205","힐스101동302호"
function parseSearch(sq){
  // 건물명 매칭 - 긴 이름 먼저 (호반써밋2 vs 호반써밋 충돌 방지)
  var sorted = ALL_BLDS.slice().sort(function(a,b){return b.length-a.length;});
  for(var i=0;i<sorted.length;i++){
    var b=sorted[i].toLowerCase();
    if(sq.startsWith(b)){
      var rest=sq.slice(b.length).trim();
      if(!rest) return null;
      var dm=rest.match(/([0-9]+)\s*동/);
      var hm=rest.match(/([0-9]+)\s*호/);
      var num=rest.replace(/[^0-9]/g,'');
      var dong=null, ho=null;
      if(dm) dong=dm[1];
      if(hm) ho=hm[1];
      // 동/호 명시 없이 숫자만 있을 때: 4자리 이상이면 동번호로 처리
      if(!dong&&!ho&&num){
        if(num.length>=3) dong=num;
        else ho=num;
      }
      if(!dong&&!ho) return null;
      return {bld:b, dong:dong, ho:ho};
    }
  }
  return null;
}

function applyAll(){
  var sq=fS.toLowerCase().trim();
  FD=RAW.filter(function(r){
    if(sq){
      var p=parseSearch(sq);
      if(p){
        var bm=!p.bld||(r['건물명']||'').toLowerCase().indexOf(p.bld)!==-1;
        // 동/호는 완전일치 (7108이 71080에 매칭되는 것 방지)
        var rDong=(r['동']||'').replace(/[^0-9]/g,'');
        var rHo=(r['호']||'').replace(/[^0-9]/g,'');
        var dm=!p.dong||(rDong===p.dong);
        var hm=!p.ho||(rHo===p.ho);
        return bm&&hm&&dm;
      }
      var pri=[(r['동']||''),(r['호']||''),(r['소유자']||''),(r['소유자2']||''),(r['이름']||'')].join(' ').toLowerCase();
      var sec=[(r['건물명']||''),(r['금액']||''),(r['상담 내용']||''),(r['임차인']||'')].join(' ').toLowerCase();
      return pri.indexOf(sq)!==-1||sec.indexOf(sq)!==-1;
    }
    if(fTypes.size>0){
      var allowed=new Set();
      fTypes.forEach(function(t){TM[t].forEach(function(v){allowed.add(v);});});
      if(!allowed.has(r['유형'])) return false;
    }
    if(fBlds.size>0&&!fBlds.has(r['건물명'])) return false;
    if(fP&&fP!=='A'){var ip=PP.indexOf(r['프로세스'])!==-1;if(fP==='P'&&!ip)return false;if(fP==='L'&&ip)return false;}
    return true;
  });
  asr();
}
function srt(col,th){

// ── 렌더 헬퍼 ────────────────────────────────────
function xph(t){
  if(!t)return[];
  var re=new RegExp('0[0-9]{1,2}[ -]?[0-9]{3,4}[ -]?[0-9]{4}','g');
  var m=(t+'').match(re)||[];var seen={},res=[];
  m.forEach(function(p){var c=p.replace(/[ -]/g,'');if(!seen[c]){seen[c]=1;res.push(c);}});
  return res;
}
function fph(p){if(p.length===11)return p.slice(0,3)+'-'+p.slice(3,7)+'-'+p.slice(7);if(p.length===10)return p.slice(0,3)+'-'+p.slice(3,6)+'-'+p.slice(6);return p;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gtc(t){return({'매매':'badge-mae','전세':'badge-jun','월세':'badge-wol','전월세':'badge-mix','매전세':'badge-mix','매전월':'badge-mix','매월세':'badge-mix'})[t]||'';}
function gpc(p){return({'완료':'proc-done','매매완료':'proc-done','계약':'proc-cont','재계약':'proc-cont','재계약확인':'proc-cont','보류':'proc-hold','대기':'proc-hold','통오더':'proc-ord','매물 확보':'proc-wait','잔금':'proc-pay','잔금정산':'proc-pay','타부동산':'proc-other','제안가능(물건등록)':'proc-prop','제안가능(미등록)':'proc-prop'})[p]||'';}
var _selected = new Set(); // 선택된 매물 인덱스
function makeCard(r,i){
  var checked=_selected.has(i)?'checked':'';
  // 주요특징 태그
  var featHtml='';
  var featRaw=r['주요특징']||'';
  if(featRaw){
    var ftags=featRaw.split(/[,，\n]/).map(function(t){return t.trim().replace(/^#/,'');}).filter(Boolean);
    if(ftags.length)featHtml=ftags.map(function(t){return'<span class="card-feature-tag">#'+esc(t)+'</span>';}).join('');
  }
  // 만기일
  var expire=r['만기일']||'';
  var expireHtml='';
  if(expire){
    // 3개월 이내면 urgent
    var expD=new Date(expire.replace(/\./g,'-'));
    var diff=(expD-new Date())/(1000*60*60*24);
    expireHtml='<span class="card-expire'+(diff<90&&diff>0?' urgent':'')+'" title="만기일">만기 '+esc(expire)+'</span>';
  } else {
    expireHtml='<span class="card-expire">만기 미정</span>';
  }
  // 면적
  var areaStr=(r['타입 (전용)']||r['타입 (공용)']||'')+(r['전용면적(㎡)']?' · '+r['전용면적(㎡)']+'㎡':'');
  // 전화번호
  var ph=xph([(r['소유자']||''),(r['소유자2']||''),(r['이름']||'')].join(' '));
  var phoneHtml=ph.map(function(p){return'<a class="phone-link" href="tel:'+p+'" onclick="event.stopPropagation()">📞 '+fph(p)+'</a>';}).join('');

  return '<div class="card" onclick="det('+i+')" style="position:relative;">'+
    '<input type="checkbox" class="card-check" '+checked+' onclick="event.stopPropagation();toggleSelect('+i+',this)">'+
    // 1행: 동/호 + 가격
    '<div class="card-row1">'+
      '<div><span class="card-dong-ho">'+esc(r['동']||'-')+'동 '+esc(r['호']||'-')+'호</span> <span class="card-building-name">'+esc(r['건물명']||'-')+'</span></div>'+

    '</div>'+
    // 2행: 유형뱃지 + 특징태그 + 만기일
    '<div class="card-row2">'+
      '<span class="badge '+gtc(r['유형']||'')+'">'+esc(r['유형']||'-')+'</span>'+
      (featHtml?featHtml:'')+
      expireHtml+
    '</div>'+
    // 3행: 전화번호
    (phoneHtml?'<div class="card-phone-row">'+phoneHtml+'</div>':'')+
    '<div class="card-date">'+esc(r['실행일']||'')+'</div>'+
  '</div>';
}

// 특정 행만 최신으로 가져오기
async function fetchLatestRow(rowIndex){
  try{
    var sn = await getSheetName();
    // 헤더(1행)와 해당 행을 한 번에 가져오기
    var range = encodeURIComponent(sn+'!1:1')+','+encodeURIComponent(sn+'!'+rowIndex+':'+rowIndex);
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'/values:batchGet?ranges='+
              encodeURIComponent(sn+'!1:1')+'&ranges='+encodeURIComponent(sn+'!'+rowIndex+':'+rowIndex)+'&key='+AKEY;
    var res = await fetch(url);
    var json = await res.json();
    if(!json.valueRanges||json.valueRanges.length<2) return null;
    var headers = json.valueRanges[0].values[0].map(function(h){return h.replace(/\n/g,' ').trim();});
    var rowData = json.valueRanges[1].values ? json.valueRanges[1].values[0] : [];
    var obj = {'__row__': rowIndex};
    headers.forEach(function(h,i){
      obj[h] = (rowData[i]||'').replace(/\n/g,' ').trim();
    });
    return obj;
  }catch(ex){
    console.warn('행 조회 실패:', ex.message);
    return null;
  }
}

function openMsgAdd(){
  _editMsgIdx=-1;
  document.getElementById('ME_TITLE2').textContent='문구 추가';
  document.getElementById('ME_CAT').value='';document.getElementById('ME_TITLE').value='';document.getElementById('ME_BODY').value='';
  document.getElementById('MSG_EDIT').classList.add('open');
}
function openMsgEdit(){
  if(_editMsgIdx<0)return;var m=ALL_MSGS[_editMsgIdx];
  document.getElementById('ME_TITLE2').textContent='문구 수정';
  document.getElementById('ME_CAT').value=m.cat||'';document.getElementById('ME_TITLE').value=m.title||'';document.getElementById('ME_BODY').value=m.body||'';
  document.getElementById('MSG_EDIT').classList.add('open');
}
function closeMsgEdit(){document.getElementById('MSG_EDIT').classList.remove('open');}
async function saveMsgEdit(){
  var cat=document.getElementById('ME_CAT').value.trim();
  var title=document.getElementById('ME_TITLE').value.trim();
  var body=document.getElementById('ME_BODY').value;
  if(!cat||!title||!body.trim()){showToast('카테고리, 제목, 내용을 모두 입력하세요');return;}
  var btn=document.querySelector('#MSG_EDIT .ef-save');
  if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  try{
    var payload,action;
    if(_editMsgIdx<0){
      action='appendMsg';
      payload={action:action,cat:cat,title:title,body:body};
    } else {
      action='updateMsg';
      var rowIdx=ALL_MSGS[_editMsgIdx].rowIndex;
      payload={action:action,rowIndex:rowIdx,cat:cat,title:title,body:body};
    }
    var res=await fetch(ASURL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
    var json=JSON.parse(await res.text());
    if(json.success){
      showToast(_editMsgIdx<0?'✅ 문구가 추가되었습니다':'✅ 문구가 수정되었습니다');
      closeMsgEdit();
      // 시트에서 최신 문구 다시 로드
      await fetchMsgsFromSheet();
      openMsgModal();
    } else {
      showToast('❌ 실패: '+json.message);
    }
  }catch(ex){showToast('❌ 오류: '+ex.message);}
  finally{if(btn){btn.textContent='💾 저장';btn.disabled=false;}}
}
async function deleteMsgCur(){
  if(_editMsgIdx<0||_editMsgIdx>=ALL_MSGS.length)return;
  if(!confirm(ALL_MSGS[_editMsgIdx].title+'\n\n이 문구를 삭제할까요?'))return;
  var rowIdx=ALL_MSGS[_editMsgIdx].rowIndex;
  showToast('🗑 삭제 중...');
  try{
    var res=await fetch(ASURL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'deleteMsg',rowIndex:rowIdx})});
    var json=JSON.parse(await res.text());
    if(json.success){
      showToast('🗑 삭제되었습니다');
      closeMsgDetail();
      await fetchMsgsFromSheet();
      openMsgModal();
    } else {
      showToast('❌ 실패: '+json.message);
    }
  }catch(ex){showToast('❌ 오류: '+ex.message);}
}

// ══════════ 주요특징 태그 ══════════
var _editTags=[];
function renderEditTags(){var w=document.getElementById('edit-tags-display');if(!w)return;w.innerHTML=_editTags.map(function(t,i){return'<span class="feature-tag">#'+esc(t)+'<button class="tag-del" onclick="removeEditTag('+i+')">×</button></span>';}).join('');}
function addEditTag(){var inp=document.getElementById('edit-tag-input');if(!inp)return;inp.value.split(/[,，\n]/).forEach(function(t){t=t.trim().replace(/^#/,'');if(t&&_editTags.indexOf(t)===-1)_editTags.push(t);});inp.value='';renderEditTags();}
function removeEditTag(i){_editTags.splice(i,1);renderEditTags();}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='edit-tag-input'){e.preventDefault();addEditTag();}});

// ══════════ 선택 관련 ══════════
function updateSelectBar(){
  var bar=document.getElementById('SELECT_BAR');if(!bar)return;
  if(_selected.size>0){bar.style.display='flex';document.getElementById('SELECT_COUNT').textContent=_selected.size+'건 선택됨';}
  else{bar.style.display='none';}
}
function clearSelection(){
  _selected.clear();updateSelectBar();
  document.querySelectorAll('.card input[type=checkbox],#TB input[type=checkbox]').forEach(function(cb){cb.checked=false;});
  var ca=document.getElementById('chk-all');if(ca)ca.checked=false;
}
function toggleAllSelect(masterCb){
  var st=(PAGE-1)*PER;FD.slice(st,st+PER).forEach(function(r,j){if(masterCb.checked)_selected.add(st+j);else _selected.delete(st+j);});
  document.querySelectorAll('#TB input[type=checkbox]').forEach(function(cb){cb.checked=masterCb.checked;});
  updateSelectBar();
}
function copySelectedText(){
  var ymd=new Date().toISOString().slice(0,10);var lines=[];
  Array.from(_selected).sort(function(a,b){return a-b;}).forEach(function(i){
    var r=FD[i];if(!r)return;
    lines.push(ymd+' / '+(r['건물명']||'')+' '+(r['유형']||'')+' '+(r['동']||'')+'동 '+(r['호']||'')+'호');
  });
  if(!lines.length){showToast('선택된 매물이 없습니다');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(lines.join('\n')).then(function(){showToast('📋 '+lines.length+'건 복사 완료!');});}
  else{var ta=document.createElement('textarea');ta.value=lines.join('\n');document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 '+lines.length+'건 복사 완료!');}
}

</script>
