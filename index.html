<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>APT 매물 조회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0d0f14;--surface:#161923;--surface2:#1e2433;--border:#2a3147;--accent:#4f9cf9;--text:#e8ecf5;--text2:#8b95b0;--text3:#5a637a;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--purple:#a78bfa;--orange:#f97316;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* 비밀번호 */
.pw-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:320px;max-width:90vw;text-align:center;}
.pw-logo{font-size:32px;margin-bottom:12px;}
.pw-title{font-size:18px;font-weight:700;margin-bottom:6px;}
.pw-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.pw-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:18px;outline:none;text-align:center;letter-spacing:6px;font-family:'DM Mono',monospace;box-sizing:border-box;}
.pw-input:focus{border-color:var(--accent);}
.pw-btn{width:100%;margin-top:12px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.pw-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;}
/* 헤더 */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
header h1{font-size:16px;font-weight:700;color:var(--accent);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sync-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:'Noto Sans KR',sans-serif;}
.sync-btn.loading{color:var(--accent);border-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin 0.8s linear infinite;}
.total-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap;}
.total-badge span{color:var(--accent);font-weight:500;}
/* 필터 */
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.filter-row{display:flex;flex-direction:column;gap:6px;}
.filter-row-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;}
.btn-group{display:flex;flex-wrap:wrap;gap:6px;}
.sel-btn{flex-shrink:0;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.sel-btn:active{transform:scale(0.96);}
.sel-btn.type-mae{border-color:rgba(79,156,249,0.4);}.sel-btn.type-mae.active{background:rgba(79,156,249,0.2);border-color:#4f9cf9;color:#4f9cf9;}
.sel-btn.type-jun{border-color:rgba(52,211,153,0.4);}.sel-btn.type-jun.active{background:rgba(52,211,153,0.2);border-color:#34d399;color:#34d399;}
.sel-btn.type-wol{border-color:rgba(251,191,36,0.4);}.sel-btn.type-wol.active{background:rgba(251,191,36,0.2);border-color:#fbbf24;color:#fbbf24;}
.sel-btn.bld-all.active{background:rgba(167,139,250,0.2);border-color:#a78bfa;color:#a78bfa;}
.sel-btn.bld-one.active{background:rgba(79,156,249,0.15);border-color:#4f9cf9;color:#4f9cf9;}
.sel-btn.proc-all.active{background:rgba(255,255,255,0.1);border-color:var(--text2);color:var(--text);}
.sel-btn.proc-propose.active{background:rgba(249,115,22,0.15);border-color:#f97316;color:#f97316;}
.sel-btn.proc-latent.active{background:rgba(167,139,250,0.15);border-color:#a78bfa;color:#a78bfa;}
.filter-divider{height:1px;background:var(--border);}
.search-row{display:flex;gap:8px;align-items:center;}
.search-input-wrap{flex:1;position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px 9px 32px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}
.reset-btn{flex-shrink:0;padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
/* 결과바 */
.result-bar{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);}
.result-bar b{color:var(--accent);}
/* 카드 */
.card-list{padding:8px 12px;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 14px 26px;cursor:pointer;position:relative;}
.card:active{background:var(--surface2);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.card-address{font-size:15px;font-weight:700;}.card-building{font-size:12px;color:var(--text3);margin-top:2px;}
.card-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.card-mid{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.card-price{font-size:16px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.card-meta{font-size:12px;color:var(--text3);}
.card-phones{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.phone-link{color:var(--green);text-decoration:none;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:3px;padding:4px 10px;background:rgba(52,211,153,0.1);border-radius:6px;border:1px solid rgba(52,211,153,0.25);}
.card-memo{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-date{position:absolute;bottom:8px;right:14px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
/* 테이블 */
.table-wrap{display:none;overflow:auto;}
@media(min-width:900px){.card-list{display:none;}.table-wrap{display:block;height:calc(100vh - 380px);}}
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;}
thead{position:sticky;top:0;z-index:10;}
thead th{background:var(--surface2);border-bottom:2px solid var(--border);border-right:1px solid var(--border);padding:10px 12px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer;user-select:none;}
thead th.sorted{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:9px 12px;border-right:1px solid rgba(42,49,71,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
.col-date{width:88px}.col-type{width:62px}.col-building{width:90px}.col-dong{width:55px}.col-ho{width:50px}.col-typev{width:62px}.col-owner{width:150px}.col-price{width:85px}.col-process{width:115px}.col-room{width:40px}.col-contract{width:82px}.col-area{width:65px}.col-memo{width:200px}
/* 뱃지 */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-mae{background:rgba(79,156,249,0.15);color:#4f9cf9;}.badge-jun{background:rgba(52,211,153,0.15);color:#34d399;}.badge-wol{background:rgba(251,191,36,0.15);color:#fbbf24;}.badge-mix{background:rgba(167,139,250,0.15);color:#a78bfa;}
.proc-done{background:rgba(52,211,153,0.15);color:#34d399;}.proc-cont{background:rgba(79,156,249,0.15);color:#4f9cf9;}.proc-hold{background:rgba(91,105,128,0.25);color:#8b95b0;}.proc-ord{background:rgba(251,191,36,0.15);color:#fbbf24;}.proc-wait{background:rgba(167,139,250,0.15);color:#a78bfa;}.proc-pay{background:rgba(52,211,153,0.2);color:#34d399;}.proc-other{background:rgba(248,113,113,0.15);color:#f87171;}.proc-prop{background:rgba(249,115,22,0.15);color:#f97316;}
/* 페이지네이션 */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.page-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:7px 12px;font-size:13px;cursor:pointer;font-family:'DM Mono',monospace;min-width:36px;text-align:center;}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}.page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;padding:0 4px;}
/* 상세 패널 */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.detail-overlay.open{display:flex;}
@media(min-width:600px){.detail-overlay{align-items:center;}.detail-panel{border-radius:12px!important;max-width:680px;width:95vw;max-height:85vh!important;}}
@keyframes slideUp{from{transform:translateY(80px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
.detail-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.detail-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1;}
.detail-title{font-size:17px;font-weight:700;}.detail-subtitle{font-size:12px;color:var(--text2);margin-top:3px;}
.detail-close{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 10px;cursor:pointer;font-size:15px;flex-shrink:0;}
.detail-body{padding:16px 20px;}
.detail-phones{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.18);border-radius:8px;}
.detail-section{margin-bottom:18px;}.detail-section-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:480px){.detail-grid{grid-template-columns:repeat(3,1fr);}}
.detail-item{display:flex;flex-direction:column;gap:3px;}.di-label{font-size:10px;color:var(--text3);font-weight:500;}.di-value{font-size:13px;color:var(--text);word-break:break-all;}.di-value.hl{color:var(--accent);font-weight:700;font-size:16px;}
.memo-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
/* 수정폼 */
.edit-form{display:none;padding:16px 20px;border-top:1px solid var(--border);}
.edit-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
.ef-group{display:flex;flex-direction:column;gap:4px;}
.ef-label{font-size:10px;color:var(--text3);}
.ef-input,.ef-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
.ef-input:focus,.ef-select:focus{border-color:var(--accent);}
.ef-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;resize:vertical;line-height:1.6;}
.ef-textarea:focus{border-color:var(--accent);}
.ef-actions{display:flex;gap:8px;margin-top:4px;}
.ef-save{flex:1;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.ef-cancel{padding:12px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
/* 토스트 */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2433;border:1px solid #34d399;color:#e8ecf5;padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;text-align:center;line-height:1.5;white-space:pre-line;box-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.3s;opacity:0;min-width:200px;max-width:80vw;}
#toast.show{opacity:1;}
/* 새 매물 모달 */
.add-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.add-modal.open{display:flex;}
.add-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
@media(min-width:600px){.add-modal{align-items:center;}.add-panel{border-radius:12px;max-width:680px;width:95vw;max-height:85vh;}}
/* 로딩 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,0.92);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-overlay.show{display:flex;}.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}.loading-text{font-size:13px;color:var(--text2);}
.empty-state{text-align:center;padding:60px 24px;color:var(--text3);}.empty-icon{font-size:36px;margin-bottom:10px;}
</style>
</head>
<body>

<!-- 데이터 -->
<textarea id="D" style="display:none"></textarea>

<!-- 비밀번호 -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-logo">🏢</div>
    <div class="pw-title">APT 매물 조회</div>
    <div class="pw-sub">비밀번호를 입력하세요</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">확인</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="LO">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="LT">데이터 로딩 중...</div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 헤더 -->
<header>
  <h1>🏢 APT 매물 조회</h1>
  <div class="header-right">
    <button onclick="openMsgModal()" style="background:rgba(251,191,36,0.12);border:1.5px solid rgba(251,191,36,0.35);border-radius:6px;color:var(--yellow);padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;">💬 안내문구</button>
    <a href="https://docs.google.com/spreadsheets/d/1Csxt63V81HA3CG2n8aYy_F5VzFzIOravBs03Xh77Hsw/edit#gid=505657259" target="_blank" style="background:rgba(52,211,153,0.12);border:1.5px solid rgba(52,211,153,0.35);border-radius:6px;color:var(--green);padding:5px 11px;font-size:12px;font-weight:600;text-decoration:none;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;">📋 매물장</a>
    <button onclick="openAddNew()" style="background:rgba(79,156,249,0.12);border:1.5px solid rgba(79,156,249,0.35);border-radius:6px;color:var(--accent);padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;">＋ 새 매물</button>
    <button class="sync-btn" id="SB" onclick="syncSheets()"><span id="SI">🔄</span> 동기화</button>
    <div class="total-badge">총 <span id="TC">-</span>건</div>
  </div>
</header>

<!-- 필터 -->
<div class="filter-panel">
  <div class="filter-row">
    <div class="filter-row-label">① 유형</div>
    <div class="btn-group">
      <button class="sel-btn type-mae" id="type-mae" onclick="selType('매매')">매매</button>
      <button class="sel-btn type-jun" id="type-jun" onclick="selType('전세')">전세</button>
      <button class="sel-btn type-wol" id="type-wol" onclick="selType('월세')">월세</button>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-row">
    <div class="filter-row-label">② 건물명</div>
    <div class="btn-group">
      <button class="sel-btn bld-all" id="bld-6대장" onclick="selBld('6대장')">6대장</button>
      <button class="sel-btn bld-one" id="bld-아이" onclick="selBld('아이')">아이</button>
      <button class="sel-btn bld-one" id="bld-아이2" onclick="selBld('아이2')">아이2</button>
      <button class="sel-btn bld-one" id="bld-더샵" onclick="selBld('더샵')">더샵</button>
      <button class="sel-btn bld-one" id="bld-힐스" onclick="selBld('힐스')">힐스</button>
      <button class="sel-btn bld-one" id="bld-중푸" onclick="selBld('중푸')">중푸</button>
      <button class="sel-btn bld-one" id="bld-송푸" onclick="selBld('송푸')">송푸</button>
      <div style="width:100%;height:1px;background:var(--border);margin:4px 0;"></div>
      <button class="sel-btn bld-one" id="bld-그린파크" onclick="selBld('그린파크')">그린파크</button>
      <button class="sel-btn bld-one" id="bld-꿈에" onclick="selBld('꿈에')">꿈에</button>
      <button class="sel-btn bld-one" id="bld-더힐" onclick="selBld('더힐')">더힐</button>
      <button class="sel-btn bld-one" id="bld-동천센자" onclick="selBld('동천센자')">동천센자</button>
      <button class="sel-btn bld-one" id="bld-래미안위례" onclick="selBld('래미안위례')">래미안위례</button>
      <button class="sel-btn bld-one" id="bld-래미안이편한" onclick="selBld('래미안이편한')">래미안이편한</button>
      <button class="sel-btn bld-one" id="bld-롯데" onclick="selBld('롯데')">롯데</button>
      <button class="sel-btn bld-one" id="bld-보미" onclick="selBld('보미')">보미</button>
      <button class="sel-btn bld-one" id="bld-센자" onclick="selBld('센자')">센자</button>
      <button class="sel-btn bld-one" id="bld-센트레" onclick="selBld('센트레')">센트레</button>

// ── 캐시 관련 ─────────────────────────────────────────────
var CACHE_KEY = 'apt_cache_v1';
var CACHE_TIME_KEY = 'apt_cache_time_v1';

function saveCache(data){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
  }catch(e){ /* 스토리지 용량 초과 시 무시 */ }
}

function loadCache(){
  try{
    var cached = localStorage.getItem(CACHE_KEY);
    var cacheTime = localStorage.getItem(CACHE_TIME_KEY);
    if(cached && cacheTime){
      var ageMin = (Date.now() - parseInt(cacheTime)) / 60000;
      var data = JSON.parse(cached);
      var ageStr = ageMin < 60 ? Math.round(ageMin)+'분' : Math.round(ageMin/60)+'시간';
      document.getElementById('LS').textContent = '캐시 '+ageStr+' 전';
      return data;
    }
  }catch(e){}
  // 캐시 없음 → 빈 배열 반환, 안내 표시
  return [];
}

async function getSheetName(){
  if(_sheetName) return _sheetName;
  var mr = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'?key='+AKEY);
  var m = await mr.json();
  if(m.error) throw new Error(m.error.message);
  var sf = m.sheets && m.sheets.find(function(s){return String(s.properties.sheetId)===SGID;});
  _sheetName = sf ? sf.properties.title : (m.sheets&&m.sheets[0]?m.sheets[0].properties.title:'');
  return _sheetName;
}

async function syncSheets(){
  var sb=document.getElementById('SB'),si=document.getElementById('SI'),lo=document.getElementById('LO'),lt=document.getElementById('LT');
  sb.classList.add('loading');si.textContent='↻';si.className='spin';lo.classList.add('show');lt.textContent='시트 연결 중...';
  try{
    var sn = await getSheetName();
    lt.textContent = '"'+sn+'" 로드 중...';

    // 핵심 열만 가져오기 (상담내용 제외 → 빠름)
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'/values/'+encodeURIComponent(sn)+'?key='+AKEY;
    var dr = await fetch(url);
    var dj = await dr.json();
    if(!dj.values||dj.values.length<2) throw new Error('데이터 없음');

    var hd = dj.values[0].map(function(h){return h.replace(/\n/g,' ').trim();});
    var nd = dj.values.slice(1).map(function(row,i){
      var o={'__row__':i+2};
      hd.forEach(function(h,j){
        if(row[j]&&row[j].trim()) o[h]=row[j].replace(/\n/g,' ').trim();
      });
      return o;
    });

    saveCache(nd);
    document.getElementById('LS').textContent='✓ '+new Date().toLocaleTimeString('ko-KR')+' 동기화';
    initData(nd); applyAll();
  }catch(e){alert('동기화 실패: '+e.message);}
  finally{lo.classList.remove('show');sb.classList.remove('loading');si.textContent='🔄';si.className='';}
}

function saveContactByIdx(idx){
  var d = (window._contactData||[])[idx];
  if(d) saveContact(d.phone, d.name, d.memo);
}
function saveContact(phone, name, memo){
  // vCard 생성
  var vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:'+name,
    'TEL;TYPE=CELL:'+phone,
    'NOTE:'+memo,
    'END:VCARD'
  ].join('\r\n');
  var blob = new Blob([vcard], {type:'text/vcard'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/\s+/g,'_')+'.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
  showToast('👤 주소록 파일 저장\n연락처 앱에서 가져오기 하세요');
}

function openMsgModal(){

  var catMap = {"\ub9e4\ub9e4": [0, 1, 2], "\uc804\uc138": [3, 4], "\uc6d4\uc138": [5, 6], "\uae30\ud0c0": [7, 8, 9]};

function copyMsg(){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(_curMsgBody).then(function(){
      showToast('📋 복사 완료!');
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=_curMsgBody; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 복사 완료!');
  }
}

function sendKakao(){

  var win = window.open(kakaoUrl);
  // 앱 없으면 클립보드 복사 후 안내
  setTimeout(function(){
    copyMsg();
    showToast('카카오톡 앱을 열어 붙여넣기 하세요\n(텍스트가 복사되었습니다)');
  }, 1500);
}

function sendSMS(){
  var encoded = encodeURIComponent(_curMsgBody);
  // iOS: sms:&body=..., Android: sms:?body=...
  var ua = navigator.userAgent.toLowerCase();
  var sep = ua.indexOf('iphone')>-1||ua.indexOf('ipad')>-1 ? '&' : '?';
  window.location.href = 'sms:'+sep+'body='+encoded;
}

  var r=FD[CUR_IDX];
  if(!r['__row__']){showToast('⚠️ 행 번호 없음\n🔄 동기화 후 다시 시도하세요');return;}

  v=document.getElementById('e-price').value;   if(v)vals['금액']=v;
  v=document.getElementById('e-date').value;    if(v)vals['실행일']=v;

  v=document.getElementById('e-agree').value;   if(v)vals['약정일']=v;
  v=document.getElementById('e-toher').value;   if(v)vals['토허제']=v;
  v=document.getElementById('e-middle').value;  if(v)vals['중도금']=v;
  v=document.getElementById('e-balance').value; if(v)vals['잔금일']=v;
  v=document.getElementById('e-rev1').value;    if(v)vals['발생수익  매도,임대(VAT포함)']=v;
  v=document.getElementById('e-rev2').value;    if(v)vals['발생수익-매수,임차  (VAT포함)']=v;
  vals['상담 내용']=document.getElementById('e-memo').value;
  if(Object.keys(vals).length===0){showToast('수정할 내용을 입력하세요');return;}
  var btn=document.getElementById('saveBtnEdit');
  btn.textContent='저장 중...';btn.disabled=true;
  showToast('⏳ 저장 중...');
  try{
    var res=await fetch(ASURL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'update',rowIndex:r['__row__'],values:vals})
    });
    var text=await res.text();
    var json=JSON.parse(text);
    if(json.success){
      Object.keys(vals).forEach(function(k){r[k]=vals[k];});
      showToast('✅ 저장 완료!\n매물장에 반영되었습니다');
      cancelEdit();
      det(CUR_IDX);
    }else{
      showToast('❌ 실패: '+json.message);

  }catch(e){

    btn.textContent='💾 저장';btn.disabled=false;
  }
}
