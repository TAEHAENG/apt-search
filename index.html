<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>APT 매물 조회</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0d0f14;--surface:#161923;--surface2:#1e2433;--border:#2a3147;--accent:#4f9cf9;--text:#e8ecf5;--text2:#8b95b0;--text3:#5a637a;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--purple:#a78bfa;--orange:#f97316;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* 비번 */
.pw-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:320px;max-width:90vw;text-align:center;}
.pw-logo{font-size:32px;margin-bottom:12px;}.pw-title{font-size:18px;font-weight:700;margin-bottom:6px;}.pw-sub{font-size:13px;color:var(--text3);margin-bottom:24px;}
.pw-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:18px;outline:none;text-align:center;letter-spacing:6px;font-family:'DM Mono',monospace;box-sizing:border-box;}
.pw-input:focus{border-color:var(--accent);}
.pw-btn{width:100%;margin-top:12px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.pw-err{color:var(--red);font-size:13px;margin-top:10px;min-height:20px;}
/* 헤더 */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
header h1{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
.hdr-btn{border-radius:6px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.hdr-btn-msg{background:rgba(251,191,36,0.12);border:1.5px solid rgba(251,191,36,0.35);color:var(--yellow);}
.hdr-btn-sheet{background:rgba(52,211,153,0.12);border:1.5px solid rgba(52,211,153,0.35);color:var(--green);}
.hdr-btn-add{background:rgba(79,156,249,0.12);border:1.5px solid rgba(79,156,249,0.35);color:var(--accent);}
.sync-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 9px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;}
.sync-btn.loading{color:var(--accent);border-color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}} .spin{display:inline-block;animation:spin 0.8s linear infinite;}
.total-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;white-space:nowrap;}
.total-badge span{color:var(--accent);font-weight:500;}
/* 필터 */
.filter-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.filter-row{display:flex;flex-direction:column;gap:5px;}
.filter-row-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;}
.btn-group{display:flex;flex-wrap:wrap;gap:5px;}
.sel-btn{flex-shrink:0;padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.sel-btn:active{transform:scale(0.96);}
.sel-btn.type-mae{border-color:rgba(79,156,249,0.4);}.sel-btn.type-mae.active{background:rgba(79,156,249,0.2);border-color:#4f9cf9;color:#4f9cf9;}
.sel-btn.type-jun{border-color:rgba(52,211,153,0.4);}.sel-btn.type-jun.active{background:rgba(52,211,153,0.2);border-color:#34d399;color:#34d399;}
.sel-btn.type-wol{border-color:rgba(251,191,36,0.4);}.sel-btn.type-wol.active{background:rgba(251,191,36,0.2);border-color:#fbbf24;color:#fbbf24;}
.sel-btn.bld-all.active{background:rgba(167,139,250,0.2);border-color:#a78bfa;color:#a78bfa;}
.sel-btn.bld-one.active{background:rgba(79,156,249,0.15);border-color:#4f9cf9;color:#4f9cf9;}
.sel-btn.proc-all.active{background:rgba(255,255,255,0.1);border-color:var(--text2);color:var(--text);}
.sel-btn.proc-propose.active{background:rgba(249,115,22,0.15);border-color:#f97316;color:#f97316;}
.sel-btn.proc-latent.active{background:rgba(167,139,250,0.15);border-color:#a78bfa;color:#a78bfa;}
.filter-divider{height:1px;background:var(--border);}
.bld-divider{width:100%;height:1px;background:var(--border);margin:2px 0;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px 9px 32px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text3);}
.reset-btn{flex-shrink:0;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:13px;cursor:pointer;white-space:nowrap;}
/* 결과바 */
.result-bar{padding:7px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);}
.result-bar b{color:var(--accent);}
/* 카드 */
.card-list{padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 13px 24px;cursor:pointer;position:relative;}
.card:active{background:var(--surface2);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px;}
.card-address{font-size:15px;font-weight:700;}.card-building{font-size:12px;color:var(--text3);margin-top:2px;}
.card-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.card-mid{display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap;}
.card-price{font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;}
.card-meta{font-size:12px;color:var(--text3);}
.card-phones{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.phone-link{color:var(--green);text-decoration:none;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:2px;padding:3px 8px;background:rgba(52,211,153,0.1);border-radius:6px;border:1px solid rgba(52,211,153,0.25);}
.card-memo{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-date{position:absolute;bottom:7px;right:12px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
/* 테이블 */
.table-wrap{display:none;overflow:auto;}
@media(min-width:900px){.card-list{display:none;}.table-wrap{display:block;height:calc(100vh - 340px);}}
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;}
thead{position:sticky;top:0;z-index:10;}
thead th{background:var(--surface2);border-bottom:2px solid var(--border);border-right:1px solid var(--border);padding:9px 11px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer;user-select:none;}
thead th.sorted{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:8px 11px;border-right:1px solid rgba(42,49,71,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;}
.col-date{width:86px}.col-type{width:60px}.col-building{width:88px}.col-dong{width:52px}.col-ho{width:48px}.col-typev{width:60px}.col-owner{width:148px}.col-price{width:84px}.col-process{width:112px}.col-room{width:38px}.col-contract{width:80px}.col-area{width:64px}.col-memo{width:200px}
/* 뱃지 */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-mae{background:rgba(79,156,249,0.15);color:#4f9cf9;}.badge-jun{background:rgba(52,211,153,0.15);color:#34d399;}.badge-wol{background:rgba(251,191,36,0.15);color:#fbbf24;}.badge-mix{background:rgba(167,139,250,0.15);color:#a78bfa;}
.proc-done{background:rgba(52,211,153,0.15);color:#34d399;}.proc-cont{background:rgba(79,156,249,0.15);color:#4f9cf9;}.proc-hold{background:rgba(91,105,128,0.25);color:#8b95b0;}.proc-ord{background:rgba(251,191,36,0.15);color:#fbbf24;}.proc-wait{background:rgba(167,139,250,0.15);color:#a78bfa;}.proc-pay{background:rgba(52,211,153,0.2);color:#34d399;}.proc-other{background:rgba(248,113,113,0.15);color:#f87171;}.proc-prop{background:rgba(249,115,22,0.15);color:#f97316;}
/* 상세 패널 */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;}
.detail-overlay.open{display:flex;}
@media(min-width:600px){.detail-overlay{align-items:center;}.detail-panel{border-radius:12px!important;max-width:680px;width:95vw;max-height:85vh!important;}}
@keyframes slideUp{from{transform:translateY(80px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
.detail-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.detail-header{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--surface);z-index:1;}
.detail-title{font-size:16px;font-weight:700;}.detail-subtitle{font-size:12px;color:var(--text2);margin-top:3px;}
.detail-close{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 10px;cursor:pointer;font-size:15px;flex-shrink:0;}
.detail-body{padding:14px 18px;}
.detail-phones{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;padding:11px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.18);border-radius:8px;}
.vcf-btn{background:rgba(79,156,249,0.12);border:1px solid rgba(79,156,249,0.3);border-radius:6px;color:#4f9cf9;font-size:11px;padding:3px 8px;cursor:pointer;margin-left:2px;}
.detail-section{margin-bottom:16px;}.detail-section-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
@media(min-width:480px){.detail-grid{grid-template-columns:repeat(3,1fr);}}
.detail-item{display:flex;flex-direction:column;gap:3px;}.di-label{font-size:10px;color:var(--text3);font-weight:500;}.di-value{font-size:13px;color:var(--text);word-break:break-all;}.di-value.hl{color:var(--accent);font-weight:700;font-size:15px;}
.memo-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:11px;font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
/* 수정폼 */
.edit-form{display:none;padding:14px 18px;border-top:1px solid var(--border);}
.edit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:10px;}
.ef-group{display:flex;flex-direction:column;gap:3px;}
.ef-label{font-size:10px;color:var(--text3);}
.ef-input,.ef-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
.ef-input:focus,.ef-select:focus{border-color:var(--accent);}
.ef-textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;resize:vertical;line-height:1.6;}
.ef-actions{display:flex;gap:8px;margin-top:4px;}
.ef-save{flex:1;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
.ef-cancel{padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:14px;cursor:pointer;}
/* 토스트 */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e2433;border:1px solid #34d399;color:#e8ecf5;padding:9px 16px;border-radius:10px;font-size:13px;z-index:9999;text-align:center;line-height:1.5;white-space:pre-line;box-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.3s;opacity:0;min-width:180px;max-width:80vw;}
#toast.show{opacity:1;}
/* 모달 공통 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}.modal-panel{border-radius:12px!important;max-width:680px;width:95vw;max-height:85vh!important;}}
.modal-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease;}
.modal-header{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:14px 18px;}
/* 로딩 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,15,20,0.92);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-overlay.show{display:flex;}.loading-spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}.loading-text{font-size:13px;color:var(--text2);}
.empty-state{text-align:center;padding:50px 24px;color:var(--text3);}.empty-icon{font-size:34px;margin-bottom:10px;}
</style>
</head>
<body>

<div id="toast"></div>

<!-- 비밀번호 -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-logo">🏢</div>
    <div class="pw-title">APT 매물 조회</div>
    <div class="pw-sub">비밀번호를 입력하세요</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">확인</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="LO">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="LT">데이터 로딩 중...</div>
</div>

<!-- 헤더 -->
<header>
  <h1>🏢 APT</h1>
  <div class="header-right">
    <button class="hdr-btn hdr-btn-msg" onclick="openMsgModal()">💬 안내문구</button>
    <a class="hdr-btn hdr-btn-sheet" href="https://docs.google.com/spreadsheets/d/1Csxt63V81HA3CG2n8aYy_F5VzFzIOravBs03Xh77Hsw/edit#gid=505657259" target="_blank">📋 매물장</a>
    <button class="hdr-btn hdr-btn-add" onclick="openAddNew()">＋ 새 매물</button>
    <button class="sync-btn" id="SB" onclick="syncSheets()"><span id="SI">🔄</span></button>
    <div class="total-badge">총 <span id="TC">-</span>건</div>
  </div>
</header>

<!-- 필터 -->
<div class="filter-panel">
  <div class="filter-row">
    <div class="filter-row-label">① 유형</div>
    <div class="btn-group">
      <button class="sel-btn type-mae" id="type-mae" onclick="selType('매매')">매매</button>
      <button class="sel-btn type-jun" id="type-jun" onclick="selType('전세')">전세</button>
      <button class="sel-btn type-wol" id="type-wol" onclick="selType('월세')">월세</button>
    </div>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-row">
    <div class="filter-row-label">② 건물명</div>
    <div class="btn-group">
      <button class="sel-btn bld-all" id="bld-6대장" onclick="selBld('6대장')">6대장</button>
      <button class="sel-btn bld-one" id="bld-아이" onclick="selBld('아이')">아이</button>
      <button class="sel-btn bld-one" id="bld-아이2" onclick="selBld('아이2')">아이2</button>
      <button class="sel-btn bld-one" id="bld-더샵" onclick="selBld('더샵')">더샵</button>
      <button class="sel-btn bld-one" id="bld-힐스" onclick="selBld('힐스')">힐스</button>
      <button class="sel-btn bld-one" id="bld-중푸" onclick="selBld('중푸')">중푸</button>
      <button class="sel-btn bld-one" id="bld-송푸" onclick="selBld('송푸')">송푸</button>
      <div class="bld-divider"></div>
      <button class="sel-btn bld-one" id="bld-그린파크" onclick="selBld('그린파크')">그린파크</button>
      <button class="sel-btn bld-one" id="bld-꿈에" onclick="selBld('꿈에')">꿈에</button>
      <button class="sel-btn bld-one" id="bld-더힐" onclick="selBld('더힐')">더힐</button>
      <button class="sel-btn bld-one" id="bld-동천센자" onclick="selBld('동천센자')">동천센자</button>
      <button class="sel-btn bld-one" id="bld-래미안위례" onclick="selBld('래미안위례')">래미안위례</button>
      <button class="sel-btn bld-one" id="bld-래미안이편한" onclick="selBld('래미안이편한')">래미안이편한</button>
      <button class="sel-btn bld-one" id="bld-롯데" onclick="selBld('롯데')">롯데</button>
      <button class="sel-btn bld-one" id="bld-보미" onclick="selBld('보미')">보미</button>
      <button class="sel-btn bld-one" id="bld-센자" onclick="selBld('센자')">센자</button>
      <button class="sel-btn bld-one" id="bld-센트레" onclick="selBld('센트레')">센트레</button>
      <button class="sel-btn bld-one" id="bld-센푸" onclick="selBld('센푸')">센푸</button>
      <button class="sel-btn bld-one" id="bld-송파롯데캐슬파인힐" onclick="selBld('송파롯데캐슬파인힐')">송파롯데캐슬파인힐</button>
      <button class="sel-btn bld-one" id="bld-송파시그니처롯데캐슬" onclick="selBld('송파시그니처롯데캐슬')">송파시그니처롯데캐슬</button>
      <button class="sel-btn bld-one" id="bld-송파위례리슈빌" onclick="selBld('송파위례리슈빌')">송파위례리슈빌</button>

function saveCache(data){
  try{
    localStorage.setItem(CACHE_KEY,JSON.stringify(data));
    localStorage.setItem(CACHE_TIME_KEY,Date.now().toString());
  }catch(e){}
}
function loadCache(){
  try{
    var c=localStorage.getItem(CACHE_KEY),t=localStorage.getItem(CACHE_TIME_KEY);
    if(c&&t){
      var age=Math.round((Date.now()-parseInt(t))/60000);
      var ageStr=age<60?age+'분':Math.round(age/60)+'시간';
      document.getElementById('LS').textContent='캐시 '+ageStr+' 전';
      return JSON.parse(c);
    }
  }catch(e){}
  return [];
}

// ── 동기화 ────────────────────────────────────────
async function getSheetName(){
  if(_sheetName) return _sheetName;
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'?key='+AKEY);
  var m=await r.json();
  if(m.error) throw new Error(m.error.message);
  var sf=m.sheets&&m.sheets.find(function(s){return String(s.properties.sheetId)===SGID;});
  _sheetName=sf?sf.properties.title:(m.sheets&&m.sheets[0]?m.sheets[0].properties.title:'');
  return _sheetName;
}
async function syncSheets(){
  var sb=document.getElementById('SB'),si=document.getElementById('SI'),lo=document.getElementById('LO'),lt=document.getElementById('LT');
  sb.classList.add('loading');si.textContent='↻';si.className='spin';lo.classList.add('show');lt.textContent='시트 연결 중...';
  try{
    var sn=await getSheetName();
    lt.textContent='"'+sn+'" 로드 중...';
    var dr=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SSID+'/values/'+encodeURIComponent(sn)+'?key='+AKEY);
    var dj=await dr.json();
    if(!dj.values||dj.values.length<2) throw new Error('데이터 없음');
    var hd=dj.values[0].map(function(h){return h.replace(/\n/g,' ').trim();});
    var nd=dj.values.slice(1).map(function(row,i){
      var o={'__row__':i+2};
      hd.forEach(function(h,j){if(row[j]&&row[j].trim()) o[h]=row[j].replace(/\n/g,' ').trim();});
      return o;
    });
    saveCache(nd);
    document.getElementById('LS').textContent='✓ '+new Date().toLocaleTimeString('ko-KR')+' 동기화';
    initData(nd); applyAll();
  }catch(e){alert('동기화 실패: '+e.message);}
  finally{lo.classList.remove('show');sb.classList.remove('loading');si.textContent='🔄';si.className='';}
}

// 검색어 파싱: "아이702호","더샵 1205","힐스101동302호"
function parseSearch(sq){
  for(var i=0;i<ALL_BLDS.length;i++){
    var b=ALL_BLDS[i].toLowerCase();
    if(sq.startsWith(b)){
      var rest=sq.slice(b.length).trim();
      var dm=rest.match(/([0-9]+)\s*동/);
      var hm=rest.match(/([0-9]+)\s*호/);
      var num=rest.replace(/동|호|\s/g,'');
      var ho=hm?hm[1]:(!dm&&num?num:null);
      var dong=dm?dm[1]:null;
      if(!ho&&!dong) return null;
      return {bld:b,dong:dong,ho:ho};
    }
  }
  return null;
}

function applyAll(){
  var sq=fS.toLowerCase().trim();
  FD=RAW.filter(function(r){
    if(sq){
      var p=parseSearch(sq);
      if(p){
        var bm=!p.bld||(r['건물명']||'').toLowerCase().indexOf(p.bld)!==-1;
        var hm=!p.ho||(r['호']||'').toLowerCase().indexOf(p.ho)!==-1;
        var dm=!p.dong||(r['동']||'').toLowerCase().indexOf(p.dong)!==-1;
        return bm&&hm&&dm;
      }
      var pri=[(r['동']||''),(r['호']||''),(r['소유자']||''),(r['소유자2']||''),(r['이름']||'')].join(' ').toLowerCase();
      var sec=[(r['건물명']||''),(r['금액']||''),(r['상담 내용']||''),(r['임차인']||'')].join(' ').toLowerCase();
      return pri.indexOf(sq)!==-1||sec.indexOf(sq)!==-1;
    }
    if(fTypes.size>0){
      var allowed=new Set();
      fTypes.forEach(function(t){TM[t].forEach(function(v){allowed.add(v);});});
      if(!allowed.has(r['유형'])) return false;
    }
    if(fBlds.size>0&&!fBlds.has(r['건물명'])) return false;
    if(fP&&fP!=='A'){var ip=PP.indexOf(r['프로세스'])!==-1;if(fP==='P'&&!ip)return false;if(fP==='L'&&ip)return false;}
    return true;
  });
  asr();
}
function srt(col,th){
  if(SC===col)SD*=-1;else{SC=col;SD=1;}
  document.querySelectorAll('thead th').forEach(function(t){t.classList.remove('sorted');});
  if(th)th.classList.add('sorted');
  asr();
}
function asr(){
  FD.sort(function(a,b){return((a[SC]||'')).localeCompare((b[SC]||''),'ko')*SD;});
  if(fTypes.size>0){
    var seen=new Set();
    FD=FD.filter(function(r){
      var k=(r['건물명']||'')+'|'+(r['동']||'')+'|'+(r['호']||'');
      if(seen.has(k))return false;seen.add(k);return true;
    });
  }
  SCROLL_END=50;render();
  document.getElementById('RC').innerHTML='검색결과: <b>'+FD.length.toLocaleString()+'</b>건';
  document.getElementById('ES').style.display=FD.length===0?'block':'none';
}

// ── 렌더 헬퍼 ────────────────────────────────────
function xph(t){
  if(!t)return[];
  var re=new RegExp('0[0-9]{1,2}[ -]?[0-9]{3,4}[ -]?[0-9]{4}','g');
  var m=(t+'').match(re)||[];var seen={},res=[];
  m.forEach(function(p){var c=p.replace(/[ -]/g,'');if(!seen[c]){seen[c]=1;res.push(c);}});
  return res;
}
function fph(p){if(p.length===11)return p.slice(0,3)+'-'+p.slice(3,7)+'-'+p.slice(7);if(p.length===10)return p.slice(0,3)+'-'+p.slice(3,6)+'-'+p.slice(6);return p;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gtc(t){return({'매매':'badge-mae','전세':'badge-jun','월세':'badge-wol','전월세':'badge-mix','매전세':'badge-mix','매전월':'badge-mix','매월세':'badge-mix'})[t]||'';}
function gpc(p){return({'완료':'proc-done','매매완료':'proc-done','계약':'proc-cont','재계약':'proc-cont','재계약확인':'proc-cont','보류':'proc-hold','대기':'proc-hold','통오더':'proc-ord','매물 확보':'proc-wait','잔금':'proc-pay','잔금정산':'proc-pay','타부동산':'proc-other','제안가능(물건등록)':'proc-prop','제안가능(미등록)':'proc-prop'})[p]||'';}

    '<div class="card-mid"><span class="card-price">'+esc(r['금액']||'-')+'</span><span class="card-meta">'+esc(r['타입 (전용)']||r['타입 (공용)']||'')+(r['방']?' · 방'+r['방']:'')+(r['전용면적(㎡)']?' · '+r['전용면적(㎡)']+'㎡':'')+'</span></div>'+
    (phHtml?'<div class="card-phones">'+phHtml+'</div>':'')+
    (r['상담 내용']?'<div class="card-memo">'+esc(r['상담 내용'])+'</div>':'')+
    '<div class="card-date">'+esc(r['실행일']||'')+'</div></div>';

  var rows='';
  FD.forEach(function(r,i){rows+=makeRow(r,i);});

// 무한스크롤
window.addEventListener('scroll',function(){
  if(window.innerWidth>=900) return;
  var sb=document.documentElement.scrollHeight-window.scrollY-window.innerHeight;
  if(sb<300&&SCROLL_END<FD.length){
    SCROLL_END=Math.min(SCROLL_END+30,FD.length);

});

// ── 주소록 저장 ───────────────────────────────────
function saveContactByIdx(idx){var d=(window._contactData||[])[idx];if(d)saveContact(d.phone,d.name,d.memo);}
function saveContact(phone,name,memo){
  var vcard=['BEGIN:VCARD','VERSION:3.0','FN:'+name,'TEL;TYPE=CELL:'+phone,'NOTE:'+memo,'END:VCARD'].join('\r\n');
  var blob=new Blob([vcard],{type:'text/vcard'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name.replace(/\s+/g,'_')+'.vcf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('👤 주소록 파일 저장\n연락처 앱에서 가져오기 하세요');
}

async function saveEdit(){
  var r=FD[CUR_IDX];
  if(!r['__row__']){showToast('⚠️ 행 번호 없음\n🔄 동기화 후 다시 시도');return;}
  var vals={},v;
  v=document.getElementById('e-type').value;    if(v)vals['유형']=v;
  v=document.getElementById('e-proc').value;    if(v)vals['프로세스']=v;
  v=document.getElementById('e-price').value;   if(v)vals['금액']=v;
  v=document.getElementById('e-date').value;    if(v)vals['실행일']=v;
  v=document.getElementById('e-expire').value;  if(v)vals['만기일']=v;
  v=document.getElementById('e-contract').value;if(v)vals['계약일']=v;
  v=document.getElementById('e-deposit').value; if(v)vals['계약금중일부']=v;
  v=document.getElementById('e-agree').value;   if(v)vals['약정일']=v;
  v=document.getElementById('e-toher').value;   if(v)vals['토허제']=v;
  v=document.getElementById('e-middle').value;  if(v)vals['중도금']=v;
  v=document.getElementById('e-balance').value; if(v)vals['잔금일']=v;
  v=document.getElementById('e-rev1').value;    if(v)vals['발생수익  매도,임대(VAT포함)']=v;
  v=document.getElementById('e-rev2').value;    if(v)vals['발생수익-매수,임차  (VAT포함)']=v;
  vals['상담 내용']=document.getElementById('e-memo').value;
  if(Object.keys(vals).length===0){showToast('수정할 내용을 입력하세요');return;}
  var btn=document.getElementById('saveBtnEdit');
  btn.textContent='저장 중...';btn.disabled=true;showToast('⏳ 저장 중...');
  try{
    var res=await fetch(ASURL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',rowIndex:r['__row__'],values:vals})});
    var json=JSON.parse(await res.text());
    if(json.success){
      Object.keys(vals).forEach(function(k){r[k]=vals[k];});
      showToast('✅ 저장 완료!');cancelEdit();det(CUR_IDX);
    } else {showToast('❌ 실패: '+json.message);}
  }catch(e){showToast('❌ 오류: '+e.message);}
  finally{btn.textContent='💾 저장';btn.disabled=false;}
}

  try{
    var res=await fetch(ASURL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'append',values:vals})});

function loadMsgs(){
  try{var s=localStorage.getItem(MSG_STORAGE_KEY);if(s)ALL_MSGS=JSON.parse(s);}catch(e){}
}
function saveMsgs(){try{localStorage.setItem(MSG_STORAGE_KEY,JSON.stringify(ALL_MSGS));}catch(e){}}
function openMsgModal(){
  var cats={};
  ALL_MSGS.forEach(function(m,i){if(!cats[m.cat])cats[m.cat]=[];cats[m.cat].push(i);});
  var h='';
  Object.keys(cats).forEach(function(cat){
    h+='<div style="margin-bottom:18px;"><div style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);">'+cat+'</div>';
    h+='<div style="display:flex;flex-direction:column;gap:7px;">';
    cats[cat].forEach(function(mi){
      var m=ALL_MSGS[mi];
      h+='<button onclick="openMsgDetail('+mi+')" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;text-align:left;cursor:pointer;width:100%;">'+
        '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;">'+esc(m.title)+'</div>'+
        '<div style="font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(m.body.replace(/\n/g,' '))+'</div></button>';
    });
    h+='</div></div>';
  });
  document.getElementById('MSG_LIST').innerHTML=h;
  document.getElementById('MSG_MODAL').classList.add('open');document.body.style.overflow='hidden';
}
function closeMsgModal(){document.getElementById('MSG_MODAL').classList.remove('open');document.body.style.overflow='';}
function openMsgDetail(mi){
  _editMsgIdx=mi;_curMsgBody=ALL_MSGS[mi].body;
  document.getElementById('MD_TITLE').textContent=ALL_MSGS[mi].title;
  document.getElementById('MD_BODY').textContent=ALL_MSGS[mi].body;
  document.getElementById('MSG_DETAIL').classList.add('open');
}
function closeMsgDetail(){document.getElementById('MSG_DETAIL').classList.remove('open');}
function copyMsg(){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(_curMsgBody).then(function(){showToast('📋 복사 완료!');});}
  else{var ta=document.createElement('textarea');ta.value=_curMsgBody;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('📋 복사 완료!');}
}
function sendKakao(){
  copyMsg();
  setTimeout(function(){showToast('카카오톡 앱을 열어\n붙여넣기 하세요');},500);
}
function sendSMS(){
  var ua=navigator.userAgent.toLowerCase();
  var sep=(ua.indexOf('iphone')>-1||ua.indexOf('ipad')>-1)?'&':'?';
  window.location.href='sms:'+sep+'body='+encodeURIComponent(_curMsgBody);
}
function openMsgAdd(){
  _editMsgIdx=-1;
  document.getElementById('ME_TITLE2').textContent='문구 추가';
  document.getElementById('ME_CAT').value='';document.getElementById('ME_TITLE').value='';document.getElementById('ME_BODY').value='';
  document.getElementById('MSG_EDIT').classList.add('open');
}
function openMsgEdit(){
  if(_editMsgIdx<0)return;var m=ALL_MSGS[_editMsgIdx];
  document.getElementById('ME_TITLE2').textContent='문구 수정';
  document.getElementById('ME_CAT').value=m.cat||'';document.getElementById('ME_TITLE').value=m.title||'';document.getElementById('ME_BODY').value=m.body||'';
  document.getElementById('MSG_EDIT').classList.add('open');
}
function closeMsgEdit(){document.getElementById('MSG_EDIT').classList.remove('open');}
function saveMsgEdit(){
  var cat=document.getElementById('ME_CAT').value.trim();
  var title=document.getElementById('ME_TITLE').value.trim();
  var body=document.getElementById('ME_BODY').value;
  if(!cat||!title||!body.trim()){showToast('카테고리, 제목, 내용을 모두 입력하세요');return;}
  if(_editMsgIdx<0){ALL_MSGS.push({cat:cat,title:title,body:body});showToast('✅ 문구가 추가되었습니다');}
  else{ALL_MSGS[_editMsgIdx]={cat:cat,title:title,body:body};showToast('✅ 문구가 수정되었습니다');}
  saveMsgs();closeMsgEdit();
  openMsgModal();
}
function deleteMsgCur(){
  if(_editMsgIdx<0||_editMsgIdx>=ALL_MSGS.length)return;
  if(!confirm(ALL_MSGS[_editMsgIdx].title+'\n\n이 문구를 삭제할까요?'))return;
  ALL_MSGS.splice(_editMsgIdx,1);saveMsgs();
  showToast('🗑 삭제되었습니다');closeMsgDetail();openMsgModal();
}
